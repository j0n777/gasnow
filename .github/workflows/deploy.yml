name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          script: |
            cd /home/docker-sites/gasnow2.0
            git pull origin main
            docker compose up -d --build
            docker image prune -f
            echo "Deploy concluído em $(date '+%Y-%m-%d %H:%M UTC')"

      - name: Ping IndexNow (Bing / Yandex / Naver / Seznam)
        if: success()
        run: |
          curl -fsS -X POST 'https://api.indexnow.org/IndexNow' \
            -H 'Content-Type: application/json; charset=utf-8' \
            -d '{
              "host": "gasnow.tools",
              "key": "e215998a6fdd355bd75e7a7525f84961",
              "keyLocation": "https://gasnow.tools/e215998a6fdd355bd75e7a7525f84961.txt",
              "urlList": [
                "https://gasnow.tools/",
                "https://gasnow.tools/sitemap.xml",
                "https://gasnow.tools/llms.txt",
                "https://gasnow.tools/llms-full.txt"
              ]
            }' && echo "✅ IndexNow notified"
