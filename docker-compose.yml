networks:
  root_default:
    external: true

services:
  gasnow:
    build: .
    container_name: gasnow
    restart: always
    networks:
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gasnow.rule=Host(`gasnow.tools`) || Host(`www.gasnow.tools`)"
      - "traefik.http.routers.gasnow.entrypoints=websecure"
      - "traefik.http.routers.gasnow.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.gasnow.middlewares=gasnow-ratelimit,gasnow-headers"
      - "traefik.http.middlewares.gasnow-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.gasnow-ratelimit.ratelimit.burst=50"
      - "traefik.http.middlewares.gasnow-headers.headers.browserXSSFilter=true"
      - "traefik.http.middlewares.gasnow-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.gasnow-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.gasnow-headers.headers.STSSeconds=315360000"
